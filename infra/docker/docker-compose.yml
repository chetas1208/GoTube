services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-gotube_minio}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-gotube_minio_secret}
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-gotube_minio}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-gotube_minio_secret}
      OBJECT_STORAGE_BUCKET_RAW: ${OBJECT_STORAGE_BUCKET_RAW:-gotube-raw-videos-dev}
      OBJECT_STORAGE_BUCKET_PROCESSED: ${OBJECT_STORAGE_BUCKET_PROCESSED:-gotube-processed-videos-dev}
      OBJECT_STORAGE_BUCKET_THUMBNAILS: ${OBJECT_STORAGE_BUCKET_THUMBNAILS:-gotube-thumbnails-dev}
    volumes:
      - ./minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]

  api:
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_PORT: "8080"
      API_ENV: ${API_ENV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-gotube_minio}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-gotube_minio_secret}
      OBJECT_STORAGE_USE_PATH_STYLE: ${OBJECT_STORAGE_USE_PATH_STYLE:-true}
      OBJECT_STORAGE_BUCKET_RAW: ${OBJECT_STORAGE_BUCKET_RAW:-gotube-raw-videos-dev}
      OBJECT_STORAGE_BUCKET_PROCESSED: ${OBJECT_STORAGE_BUCKET_PROCESSED:-gotube-processed-videos-dev}
      OBJECT_STORAGE_BUCKET_THUMBNAILS: ${OBJECT_STORAGE_BUCKET_THUMBNAILS:-gotube-thumbnails-dev}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      ALLOWED_VIDEO_TYPES: ${ALLOWED_VIDEO_TYPES}
      RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM}
      RATE_LIMIT_UPLOAD_RPM: ${RATE_LIMIT_UPLOAD_RPM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ../../
      dockerfile: backend/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-gotube_minio}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-gotube_minio_secret}
      OBJECT_STORAGE_USE_PATH_STYLE: ${OBJECT_STORAGE_USE_PATH_STYLE:-true}
      OBJECT_STORAGE_BUCKET_RAW: ${OBJECT_STORAGE_BUCKET_RAW:-gotube-raw-videos-dev}
      OBJECT_STORAGE_BUCKET_PROCESSED: ${OBJECT_STORAGE_BUCKET_PROCESSED:-gotube-processed-videos-dev}
      OBJECT_STORAGE_BUCKET_THUMBNAILS: ${OBJECT_STORAGE_BUCKET_THUMBNAILS:-gotube-thumbnails-dev}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES}
      FFMPEG_CRF: ${FFMPEG_CRF}
      FFMPEG_PRESET: ${FFMPEG_PRESET}
      TEMP_DIR: /tmp/gotube-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
